# Local/self-host single-node profile (Technical Roadmap.md §11). Brings up
# every storage dependency AgentMesh's services need — Postgres (control
# plane), ClickHouse (trace store), Redis (pub/sub + rate limiting), MinIO
# (S3-compatible blob storage) — plus the Collector, Query API, Realtime
# Gateway, background Jobs worker, MCP Gateway (opt-in `mcp-gateway`
# profile, see that stanza's comment for why), and Web Console/Replay
# Engine services, each depending on the storage layer's health checks so
# they never start against a not-yet-ready dependency.
#
# Host ports are env-overridable (`${VAR:-default}`) rather than hardcoded:
# a developer machine that already runs Postgres/Redis on the standard ports
# (common) should not be forced to stop them just to evaluate AgentMesh —
# they can set e.g. AGENTMESH_POSTGRES_PORT=15432 instead. Defaults below
# deliberately avoid the most commonly-occupied ports (5432, 6379).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agentmesh
      POSTGRES_PASSWORD: agentmesh
      POSTGRES_DB: agentmesh
    ports:
      - "${AGENTMESH_POSTGRES_PORT:-15432}:5432"
    volumes:
      - agentmesh_postgres_data:/var/lib/postgresql/data
      - ../schema/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentmesh -d agentmesh"]
      interval: 5s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    environment:
      # Setting CLICKHOUSE_PASSWORD is not optional here: the official image
      # detects a non-empty docker-entrypoint-initdb.d directory and, if no
      # password is set for the `default` user, restricts it to local
      # (Unix-socket) connections only — `docker exec ... clickhouse-client`
      # keeps working, but any TCP-based client (the Collector's ClickHouse
      # driver, DBeaver, etc.) is rejected with AUTHENTICATION_FAILED even
      # though users.xml still shows `<networks><ip>::/0</ip></networks>`.
      # Caught by actually running the Collector against this compose stack,
      # not by inspection.
      CLICKHOUSE_PASSWORD: agentmesh
    ports:
      - "8123:8123" # HTTP interface
      - "9000:9000" # native protocol
    volumes:
      - agentmesh_clickhouse_data:/var/lib/clickhouse
      - ../schema/clickhouse:/docker-entrypoint-initdb.d:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${AGENTMESH_REDIS_PORT:-16379}:6379"
    volumes:
      - agentmesh_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: agentmesh
      MINIO_ROOT_PASSWORD: agentmesh-dev-secret
    ports:
      - "9002:9000" # S3 API (9000/9001 avoided to dodge the collector's own port later)
      - "9001:9001" # web console
    volumes:
      - agentmesh_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  collector:
    build:
      context: ..
      dockerfile: services/collector/Dockerfile
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      AGENTMESH_COLLECTOR_GRPC_ADDR: ":4317"
      AGENTMESH_CLICKHOUSE_ADDR: "clickhouse:9000"
      AGENTMESH_CLICKHOUSE_USER: "default"
      AGENTMESH_CLICKHOUSE_PASSWORD: "agentmesh"
      AGENTMESH_POSTGRES_DSN: "postgres://agentmesh:agentmesh@postgres:5432/agentmesh"
      AGENTMESH_MINIO_ADDR: "minio:9000" # internal Docker network port, not the host-mapped 9002
      AGENTMESH_MINIO_ACCESS_KEY: "agentmesh"
      AGENTMESH_MINIO_SECRET_KEY: "agentmesh-dev-secret"
      AGENTMESH_MINIO_BUCKET: "agentmesh-blobs"
      AGENTMESH_REDIS_ADDR: "redis:6379" # for the realtime-gateway span-event publish path (Milestone 5)
    ports:
      - "${AGENTMESH_COLLECTOR_PORT:-4317}:4317"

  query-api:
    build:
      context: ..
      dockerfile: services/query-api/Dockerfile
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      AGENTMESH_QUERYAPI_HTTP_ADDR: ":8080"
      AGENTMESH_CLICKHOUSE_ADDR: "clickhouse:9000"
      AGENTMESH_CLICKHOUSE_USER: "default"
      AGENTMESH_CLICKHOUSE_PASSWORD: "agentmesh"
      AGENTMESH_POSTGRES_DSN: "postgres://agentmesh:agentmesh@postgres:5432/agentmesh"
    ports:
      - "${AGENTMESH_QUERYAPI_PORT:-8080}:8080"

  realtime-gateway:
    build:
      context: ..
      dockerfile: services/realtime-gateway/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      AGENTMESH_REALTIME_HTTP_ADDR: ":8081"
      AGENTMESH_POSTGRES_DSN: "postgres://agentmesh:agentmesh@postgres:5432/agentmesh"
      AGENTMESH_REDIS_ADDR: "redis:6379"
    ports:
      - "${AGENTMESH_REALTIME_PORT:-8081}:8081"

  jobs:
    build:
      context: ..
      dockerfile: services/jobs/Dockerfile
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      AGENTMESH_POSTGRES_URL: "postgres://agentmesh:agentmesh@postgres:5432/agentmesh?sslmode=disable"
      AGENTMESH_CLICKHOUSE_ADDR: "clickhouse:9000"
    # No exposed ports: jobs is a background worker with no HTTP surface
    # (Architecture.md §8's internal job queue, Milestone 4).

  mcp-gateway:
    build:
      context: ..
      dockerfile: services/mcp-gateway/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      collector:
        condition: service_started
    environment:
      AGENTMESH_MCPGATEWAY_HTTP_ADDR: ":8092"
      AGENTMESH_MCPGATEWAY_UPSTREAM_URL: "http://host.docker.internal:9090" # legacy single-upstream mode's default target; irrelevant once servers are registered via the Milestone 6 Registry
      AGENTMESH_COLLECTOR_GRPC_ADDR: "collector:4317"
      AGENTMESH_POSTGRES_DSN: "postgres://agentmesh:agentmesh@postgres:5432/agentmesh"
      AGENTMESH_REDIS_ADDR: "redis:6379"
      # AGENTMESH_MCPGATEWAY_API_KEY is required and has no safe default: the
      # Gateway is itself an OTLP client of the Collector (it exports its own
      # mcp.call audit spans) and therefore needs a real, Postgres-registered
      # API key, which cannot exist before a project has been created —
      # provision one first via `POST /v1/setup` against the query-api
      # service (see README.md's "Local Development" section), then set
      # AGENTMESH_MCPGATEWAY_API_KEY=<the returned api_key> in your shell (or
      # a .env file next to this compose file) before `docker compose up
      # mcp-gateway`. The Gateway refuses to start without it.
      AGENTMESH_MCPGATEWAY_API_KEY: "${AGENTMESH_MCPGATEWAY_API_KEY:?set this to a real API key from POST /v1/setup — see README.md}"
    ports:
      - "${AGENTMESH_MCPGATEWAY_PORT:-8092}:8092"
    profiles: ["mcp-gateway"] # opt-in: requires the manual API-key bootstrap step above, so it never blocks `docker compose up`'s default core-stack path

  console:
    build:
      context: ../web/console
      dockerfile: Dockerfile
    depends_on:
      - query-api
      - replay-engine
    environment:
      # These are baked into the Vite build if passed during build, or read dynamically?
      # Actually Vite env vars are baked at build time. For a real Dockerfile, we should pass them as build args.
      # But for this compose stack, we can just use the defaults since they match the localhost exposed ports
      # (e.g., http://localhost:8080).
      - VITE_QUERY_API_URL=http://localhost:8080
      - VITE_REPLAY_ENGINE_URL=http://localhost:8090
    ports:
      - "${AGENTMESH_CONSOLE_PORT:-3001}:80"
  replay-engine:
    build:
      context: ..
      dockerfile: services/replay-engine/Dockerfile
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      AGENTMESH_REPLAYENGINE_HTTP_ADDR: ":8090"
      AGENTMESH_CLICKHOUSE_ADDR: "clickhouse:9000"
      AGENTMESH_CLICKHOUSE_USER: "default"
      AGENTMESH_CLICKHOUSE_PASSWORD: "agentmesh"
      AGENTMESH_POSTGRES_DSN: "postgres://agentmesh:agentmesh@postgres:5432/agentmesh"
      AGENTMESH_MINIO_ADDR: "minio:9000"
      AGENTMESH_MINIO_ACCESS_KEY: "agentmesh"
      AGENTMESH_MINIO_SECRET_KEY: "agentmesh-dev-secret"
      AGENTMESH_MINIO_BUCKET: "agentmesh-blobs"
    ports:
      - "${AGENTMESH_REPLAYENGINE_PORT:-8090}:8090"

  marketing:
    build:
      context: ../web/marketing
    profiles: ["marketing"] # opt-in: `docker compose --profile marketing up -d`; not part of the core stack every developer needs.
    ports:
      - "${AGENTMESH_MARKETING_PORT:-8888}:80"

volumes:
  agentmesh_postgres_data:
  agentmesh_clickhouse_data:
  agentmesh_redis_data:
  agentmesh_minio_data:
