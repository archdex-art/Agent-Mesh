name: Release CLI

# Technical Roadmap.md §9/§10: CLI is distributed as prebuilt GitHub
# Releases binaries + a Homebrew formula, versioned separately from the
# container images this repo also ships (semantic versioning, per
# Technical Roadmap.md §9's "Release versioning"). Triggered only by a
# `cli-v*` tag so cutting a CLI release is independent of any service's
# release cadence.
on:
  push:
    tags:
      - "cli-v*"

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
          workdir: cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
