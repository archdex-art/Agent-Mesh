name: CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  go-test:
    name: Go Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -v ./...

  python-test:
    name: Python Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio
          
          # Install core SDK
          pip install -e sdk/python
          
          # Install common integrations layer
          pip install -e sdk/integrations/common
          
          # Install all frameworks
          pip install -e sdk/integrations/langgraph
          pip install -e sdk/integrations/crewai
          pip install -e sdk/integrations/autogen
          pip install -e sdk/integrations/openai-agents-sdk

      - name: Run Pytest
        run: |
          pytest sdk/python/tests -v
          pytest sdk/integrations/common/tests -v
          pytest sdk/integrations/langgraph/tests -v
          pytest sdk/integrations/crewai/tests -v
          pytest sdk/integrations/autogen/tests -v
          pytest sdk/integrations/openai-agents-sdk/tests -v

  web-marketing-test:
    name: Web Marketing Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/marketing
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/marketing/package-lock.json
      
      - name: Install dependencies
        run: npm ci
        
      - name: Lint
        run: npx oxlint src
        
      - name: Build
        run: npm run build
